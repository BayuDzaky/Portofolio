<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PortfolioHub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#111;
    color:white;
    overflow-x: hidden; /* Mencegah scrollbar horizontal pada halaman utama */
}

/* NAVBAR */

nav{
    height:75px;
    border-bottom:1px solid #222;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 40px;
    position:sticky;
    top:0;
    background:#111;
    z-index:100;
}

.logo{
    font-size:26px; /* Diperkecil sedikit agar lebih proporsional */
    font-weight:bold;
    color:#fff;
}

.left{
    display:flex;
    align-items:center;
    gap:35px;
}

.left a{
    color:white;
    text-decoration:none;
    font-size:17px;
    transition:.3s;
}

.left a:hover{
    color:#2D7FF9;
}

.search{
    width:350px; /* Ukuran default disesuaikan */
    max-width: 100%;
    height:45px;
    border-radius:30px;
    background:#1f1f1f;
    border:none;
    color:white;
    padding:0 20px;
    outline:none;
    transition: 0.3s;
}

.search:focus {
    background: #252525;
    box-shadow: 0 0 0 2px #2D7FF9;
}

.right{
    display:flex;
    align-items:center;
    gap:20px;
}

nav button{
    background:#2D7FF9;
    border:none;
    color:white;
    padding:12px 22px;
    border-radius:25px;
    cursor:pointer;
    font-weight:600;
    transition: 0.2s;
}

nav button:hover {
    background: #1a6cd4;
}

.avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#29b6f6;
    background-image: url('PP.jpeg');
    background-size: cover;
    background-position: center;
    cursor:pointer;
}

/* USER DROPDOWN */

.profile-container {
    position: relative;
    display: inline-block;
    padding: 10px 0;
}

.dropdown-menu {
    position: absolute;
    top: 55px;
    right: 0;
    width: 320px;
    background: #1a1a1a;
    border: 1px solid #2b2b2b;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    opacity: 0;
    visibility: hidden;
    transform: translateY(10px);
    transition: all 0.25s ease;
    z-index: 200;
    overflow: hidden;
}

.profile-container:hover .dropdown-menu {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.dropdown-header {
    padding: 25px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.dropdown-header .avatar-large {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background-image: url('PP.jpeg');
    background-size: cover;
    background-position: center;
    margin-bottom: 12px;
    border: 2px solid #333;
}

.dropdown-header .user-name {
    font-weight: 600;
    font-size: 18px;
    color: #fff;
}

.dropdown-header .user-email {
    font-size: 13px;
    color: #888;
    margin-top: 4px;
}

.btn-profile-link {
    width: 90%;
    background: linear-gradient(90deg, #0056ff, #00a2ff);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 11px 0;
    font-weight: 600;
    font-size: 14px;
    margin-top: 18px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: opacity 0.2s;
}

.btn-profile-link:hover {
    opacity: 0.9;
}

/* FILTER */

.filter {
    display:flex;
    gap:15px;
    padding:30px 40px;
    overflow-x: auto;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch; /* Scroll lancar di iOS */
}

/* Menyembunyikan default scrollbar filter di beberapa browser agar tetap rapi */
.filter::-webkit-scrollbar {
    height: 5px;
}
.filter::-webkit-scrollbar-thumb {
    background: #222;
    border-radius: 10px;
}

.filter button{
    background:#1f1f1f;
    border-radius:15px;
    padding:12px 20px;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: 600;
    flex-shrink: 0; /* Mencegah tombol mengkerut di layar kecil */
    transition: 0.2s;
}

.filter button:hover {
    background: #2a2a2a;
}

.filter button.active{
    background:#2D7FF9;
}

/* GRID LAYOUT RESPONSIVE & SEJAJAR */
.container{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); /* Responsif otomatis mengisi ruang */
    gap:25px;
    padding:0 40px 50px;
    max-width: 1440px; /* Batas maksimal pada monitor super lebar */
    margin: 0 auto;
}

.card{
    background:#1a1a1a;
    border-radius:20px;
    overflow:hidden;
    transition:.3s;
    cursor:pointer;
    display: flex;
    flex-direction: column;
    border: 1px solid #222;
}

.card:hover{
    transform:translateY(-6px);
    border-color: #333;
}

/* Semua gambar memiliki aspek rasio potret konstan yang terisi penuh */
.card img{
    width:100%;
    height:380px; 
    object-fit: cover; 
    display: block;
}

.info{
    padding:20px;
}

.title{
    font-size:17px;
    font-weight:600;
    margin-bottom:6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.author{
    color:#9b9b9b;
    font-size:14px;
}

/* MODAL DETAIL (HORIZONTAL SCROLL) */

.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}

.modal-overlay.active {
    opacity: 1;
    pointer-events: all;
}

.modal-wrapper {
    width: 92%;
    max-width: 1200px;
    height: 85vh;
    background: #161616;
    border-radius: 24px;
    border: 1px solid #222;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
}

.modal-header {
    padding: 20px 30px;
    border-bottom: 1px solid #222;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #161616;
}

.modal-header-info h2 {
    font-size: 20px;
    font-weight: 600;
}

.modal-header-info p {
    color: #9b9b9b;
    font-size: 13px;
    margin-top: 4px;
}

.close-btn {
    background: #252525;
    border: none;
    color: white;
    font-size: 24px;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
    flex-shrink: 0;
}

.close-btn:hover {
    background: #333;
}

.modal-body-horizontal {
    flex: 1;
    display: flex;
    gap: 25px;
    padding: 25px;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
}

.modal-body-horizontal::-webkit-scrollbar {
    height: 8px;
}
.modal-body-horizontal::-webkit-scrollbar-track {
    background: #161616;
}
.modal-body-horizontal::-webkit-scrollbar-thumb {
    background: #333;
    border-radius: 4px;
}
.modal-body-horizontal::-webkit-scrollbar-thumb:hover {
    background: #444;
}

.modal-item {
    flex: 0 0 auto;
    height: 100%;
    scroll-snap-align: start;
    border-radius: 12px;
    overflow: hidden;
    width: auto;    
    display: flex;
    align-items: center;
}

.modal-item img {
    height: 100%;
    width: auto;
    max-width: 100%; /* Agar gambar tidak keluar dari pembatas */
    object-fit: contain; 
    border-radius: 12px;
    background: #0d0d0d;
}

.modal-item.description-box {
    width: 380px;
    background: #1f1f1f;
    padding: 25px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    white-space: normal; /* Mengizinkan teks untuk membungkus ke bawah */
}

footer{
    text-align:center;
    padding:30px;
    color:#777;
    border-top:1px solid #222;
}

/* MEDIA QUERIES UNTUK RESPONSIVE DI BERBAGAI RESOLUSI */

/* Resolusi Layar Tablet & HP Medium (max-width: 900px) */
@media(max-width:900px){

    nav {
        padding: 0 20px;
        height: 70px;
    }

    .logo {
        font-size: 22px;
    }

    .left {
        gap: 20px;
    }

    .search{
        display:none; /* Menyembunyikan kotak pencarian di navbar untuk menghemat ruang */
    }

    .container{
        padding: 0 20px 40px;
        gap: 20px;
    }

    .filter{
        padding: 20px;
    }

    /* Penyesuaian Modal pada Tablet */
    .modal-wrapper {
        height: 80vh;
    }

    .modal-body-horizontal {
        gap: 15px;
        padding: 15px;
    }

    .modal-item {
        width: 80%; /* Item mengambil ruang lebih lebar agar jelas */
    }

    .modal-item.description-box {
        width: 80%;
    }
}

/* Resolusi Layar HP Kecil (max-width: 600px) */
@media(max-width:600px){

    nav {
        padding: 0 15px;
    }

    .logo {
        font-size: 20px;
    }

    .left a {
        font-size: 15px;
    }

    nav button {
        padding: 8px 16px;
        font-size: 13px;
    }

    .avatar {
        width: 35px;
        height: 35px;
    }

    .dropdown-menu {
        width: 280px;
        right: -10px;
    }

    .dropdown-header {
        padding: 20px 15px;
    }

    .dropdown-header .avatar-large {
        width: 70px;
        height: 70px;
    }

    /* Card disesuaikan agar pas di layar portrait HP */
    .container {
        grid-template-columns: 1fr; /* Menampilkan 1 kolom penuh di HP agar gambar tidak kekecilan */
        padding: 0 15px 30px;
    }

    .card img {
        height: 320px; /* Dipersempit sedikit tingginya agar proporsional di HP */
    }

    /* Penyesuaian Modal di Handphone */
    .modal-wrapper {
        width: 95%;
        height: 85vh;
        border-radius: 16px;
    }

    .modal-header {
        padding: 15px 20px;
    }

    .modal-header-info h2 {
        font-size: 18px;
    }

    .close-btn {
        width: 38px;
        height: 38px;
        font-size: 20px;
    }

    .modal-body-horizontal {
        flex-direction: column; /* Mengubah arah scroll dari horizontal menjadi vertikal pada HP agar mudah dibaca */
        overflow-y: auto;
        overflow-x: hidden;
        scroll-snap-type: y mandatory;
    }

    .modal-item {
        width: 100% !important;
        height: auto;
        flex: 0 0 auto;
        margin-bottom: 15px;
    }

    .modal-item img {
        width: 100%;
        height: auto;
        max-height: 400px;
        object-fit: cover;
    }

    .modal-item.description-box {
        width: 100% !important;
        padding: 20px;
        gap: 20px;
    }
}

</style>

</head>
<body>

<div class="logo">PortfolioHub</div>

</div>
<input class="search" id="searchInput" type="text" placeholder="Search Portfolio...">
<div class="right">

<div class="profile-container">

            <div class="user-email">funnymine165@gmail.com</div>
            <a href="profile.html" class="btn-profile-link">Go to my profile</a>

</div>
</nav>

<div class="filter" id="filterContainer">
<button class="active" data-category="For You">For You</button>

            <div class="modal-header-info">
                <h2 id="modalTitle">Project Title</h2>
                <p id="modalAuthor">by Author Name</p>
            </div>
            <button class="close-btn" id="closeModal">&times;</button>
        </div>
        <div class="modal-body-horizontal" id="modalBody"></div>
    </div>
</div>

<footer>
©2026 PortfolioHub
</footer>

<script>

const galleryContainer=document.getElementById("gallery");
const searchInput = document.getElementById("searchInput");
let currentCategory = "For You";

function shuffleArray(array) {
    const newArray = [...array];
    for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
    }
    return newArray;
}

function filterAndRenderProjects() {
    const searchQuery = searchInput.value.toLowerCase().trim();

    let filtered = projects.filter(project => {
        return project.title.toLowerCase().includes(searchQuery) || 
               project.author.toLowerCase().includes(searchQuery);
    });

    if (currentCategory === "For You") {
        filtered = shuffleArray(filtered);
    } else {
        filtered = filtered.filter(project => project.category === currentCategory);
    }

    renderProjects(filtered);
}

function renderProjects(projectsToRender) {
    galleryContainer.innerHTML = "";
    
    if(projectsToRender.length === 0) {
        galleryContainer.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #555; padding: 40px;">Tidak ada hasil portfolio yang cocok ditemukan.</div>`;
        return;
    }

    projectsToRender.forEach(project=>{
        galleryContainer.innerHTML+=`
        <div class="card" onclick="openProject(${project.id})">
            <img src="${project.image}">
            <div class="info">
                <div class="title">${project.title}</div>
                <div class="author">${project.author}</div>
            </div>
        </div>
        `;
    });
}

filterAndRenderProjects();

searchInput.addEventListener("input", filterAndRenderProjects);

const filterButtons=document.querySelectorAll(".filter button");
filterButtons.forEach(btn=>{
    btn.onclick=()=>{
        filterButtons.forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");

        currentCategory = btn.getAttribute("data-category");
        filterAndRenderProjects();
    }
});

const modal = document.getElementById("projectModal");
const modalTitle = document.getElementById("modalTitle");
const modalAuthor = document.getElementById("modalAuthor");
const modalBody = document.getElementById("modalBody");
const closeModal = document.getElementById("closeModal");

function openProject(id) {
    const project = projects.find(p => p.id === id);
    if (!project) return;

    modalTitle.innerText = project.title;
    modalAuthor.innerText = `Theme : ${project.author}`;
    
    let bodyContent = `
        <div class="modal-item">
            <img src="${project.image}" alt="Main Image">
        </div>
    `;

    if(project.gallery && project.gallery.length > 0) {
        project.gallery.forEach(imgUrl => {
            bodyContent += `
                <div class="modal-item">
                    <img src="${imgUrl}" alt="Gallery Image">
                </div>
            `;
        });
    }

    bodyContent += `
        <div class="modal-item description-box">
            <div>
                <h3 style="margin-bottom: 15px; color: #2D7FF9;">About Project</h3>
                <p style="line-height: 1.6; color: #ddd;">${project.desc}</p>
            </div>
            <div style="color: #666; font-size: 13px;">
                Published via PortfolioHub • 2026
            </div>
        </div>
    `;

    modalBody.innerHTML = bodyContent;
    modal.classList.add("active");
    
    // Reset scroll modal
    modalBody.scrollLeft = 0;
    modalBody.scrollTop = 0;
}

closeModal.onclick = () => {
    modal.classList.remove("active");
};

window.onclick = (e) => {
    if (e.target === modal) {
        modal.classList.remove("active");
    }
};

</script>
